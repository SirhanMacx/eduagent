name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          mkdir -p clawed/_cli_bundle
          echo '{"type": "module"}' > clawed/_cli_bundle/package.json
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Run tests
        run: |
          ulimit -n 4096
          pytest --tb=short -q

  typescript-build:
    runs-on: ubuntu-latest
    continue-on-error: true  # TS build is complex (Bun bundler + feature flags) — don't block Python CI
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify Bun is available
        run: bun --version
      - name: Install CLI dependencies
        run: cd cli && npm install
      - name: Build TypeScript CLI
        run: cd cli && node scripts/build-cli.mjs
      - name: Verify build output
        run: test -f cli/source/cli.js

  wheel-build:
    needs: [python-tests]  # Don't block on TS build — Python wheel works standalone
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create CLI bundle placeholder
        run: |
          mkdir -p clawed/_cli_bundle
          echo '{"type": "module"}' > clawed/_cli_bundle/package.json
      - name: Build wheel
        run: |
          pip install build
          bash scripts/build.sh --skip-ts
      - name: Verify wheel size
        run: |
          ls -lh dist/*.whl
          WHEEL_SIZE=$(stat -c%s dist/*.whl 2>/dev/null || stat -f%z dist/*.whl)
          MAX_SIZE=$((50 * 1024 * 1024))
          if [ "$WHEEL_SIZE" -gt "$MAX_SIZE" ]; then
            echo "ERROR: Wheel too large ($WHEEL_SIZE bytes)"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [wheel-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create CLI bundle placeholder
        run: |
          mkdir -p clawed/_cli_bundle
          echo '{"type": "module"}' > clawed/_cli_bundle/package.json
      - name: Build and publish
        run: |
          pip install build twine
          bash scripts/build.sh --skip-ts
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
