<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list! — Claw-ED</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.card {
  max-width: 520px;
  background: #1a1a2e;
  border: 1px solid rgba(233, 69, 96, 0.2);
  border-radius: 16px;
  padding: 3rem 2.5rem;
}
.icon { font-size: 3.5rem; margin-bottom: 1rem; }
h1 { font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 0.75rem; }
p { color: #8a8a9a; margin-bottom: 1.5rem; line-height: 1.7; }
a {
  display: inline-block;
  background: #e94560;
  color: white;
  padding: 0.7rem 1.5rem;
  border-radius: 8px;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.2s;
}
a:hover { background: #d63851; }
.gh-link { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #e0e0e0; margin-left: 0.75rem; }
.gh-link:hover { background: rgba(255,255,255,0.08); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🎓</div>
    <h1>You're on the list!</h1>
    <p>Thanks for your interest in Claw-ED. We'll reach out when early access opens — teachers first.</p>
    <p>In the meantime, <strong>Claw-ED is open source and installable today</strong> with <code style="background:#0a0a14;padding:2px 6px;border-radius:4px;font-size:0.9em;">pip install eduagent</code>.</p>
    <div style="display:flex;gap:0;align-items:center;justify-content:center;flex-wrap:wrap;gap:0.75rem;">
      <a href="/">← Back to home</a>
      <a class="gh-link" href="https://github.com/SirhanMacx/eduagent" target="_blank" rel="noopener">⭐ Star on GitHub</a>
    </div>
  </div>
</body>
</html>
