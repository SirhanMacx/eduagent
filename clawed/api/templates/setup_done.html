<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw-ED — Ready!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1a1a2e;border-radius:20px;padding:48px;max-width:520px;width:100%;text-align:center;border:1px solid rgba(46,204,113,.2)}
h1{font-size:2rem;margin-bottom:12px}
.check{font-size:3.5rem;margin-bottom:16px}
p{color:#8a8a9a;margin-bottom:24px;font-size:1.05rem;line-height:1.6}
.highlight{color:#2ecc71;font-weight:600}
.buttons{display:flex;flex-direction:column;gap:12px;margin-top:24px}
a.btn{display:block;padding:14px;border-radius:12px;text-decoration:none;font-weight:600;font-size:1.05rem;font-family:inherit}
.btn-primary{background:#2ecc71;color:#fff}
.btn-secondary{background:transparent;border:1px solid #e94560;color:#e94560}
.btn:hover{opacity:.9}
.tip{margin-top:28px;font-size:.9rem;color:#666;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
.tip code{background:#12121f;padding:3px 8px;border-radius:4px;font-size:.85rem}
</style>
</head>
<body>
<div class="card">
<div class="check">✅</div>
<h1>You're all set, TEACHER_NAME_PLACEHOLDER!</h1>
<p>
Claw-ED is ready to help you plan lessons, build assessments, and generate materials — all in your teaching voice.
FILES_PLACEHOLDER
</p>
<div class="buttons">
<a href="/dashboard" class="btn btn-primary">Open Dashboard</a>
<a href="/generate" class="btn btn-secondary">Generate a Lesson</a>
</div>
<div class="tip">
Or from the terminal: <code>clawed chat</code> &nbsp;|&nbsp; <code>clawed bot</code> &nbsp;|&nbsp; <code>clawed serve</code>
</div>
</div>
</body>
</html>
