<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EDUagent{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">EDUagent</a>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/generate">Generate</a>
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>EDUagent &mdash; Your teaching files, your AI co-teacher.</p>
    </footer>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
