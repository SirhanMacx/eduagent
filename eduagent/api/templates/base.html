<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EDUagent{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">EDUagent</a>
            <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/generate">Generate</a>
                <a href="/stats">My Stats</a>
                <a href="/dashboard">My Library</a>
                <a href="/settings">Settings</a>
            </div>
        </div>
    </nav>
    {% block breadcrumbs %}{% endblock %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="status-bar" id="status-bar">
            <span class="status-dot" id="status-dot"></span>
            <a href="/settings" class="status-text" id="status-text">Checking connection...</a>
        </div>
        <p>EDUagent &mdash; Your teaching files, your AI co-teacher.</p>
    </footer>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
