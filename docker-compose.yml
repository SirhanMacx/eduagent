services:
  web:
    build: .
    ports:
      - "127.0.0.1:8000:8000"  # Localhost only. Use a reverse proxy for external access.
    env_file: .env
    environment:
      - EDUAGENT_DATA_DIR=/data
    volumes:
      - clawed-data:/data
      - ./materials:/materials:ro
    restart: unless-stopped
    command: clawed serve --host 127.0.0.1 --port 8000

  bot:
    build: .
    env_file: .env
    environment:
      - EDUAGENT_DATA_DIR=/data
    volumes:
      - clawed-data:/data
    restart: unless-stopped
    command: clawed bot
    depends_on:
      - web

volumes:
  clawed-data:
